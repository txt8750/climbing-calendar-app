kind = "mobile"
previewPath = "/"
title = "클라이밍 캘린더"
version = "1.0.0"
id = "artifacts/climbing-calendar"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21382

[services.development]
run = "pnpm --filter @workspace/climbing-calendar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/climbing-calendar", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/climbing-calendar", "run", "serve" ]

[services.env]
PORT = "21382"
BASE_PATH = "/"
